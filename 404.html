<!DOCTYPE html>
<html>

<head>
    <title>Redirecting...</title>
    <script>
        // Use the actual repository name as the prefix
        const repoPrefix = "/site";

        // Your custom URL mappings
        const redirectMap = {
            "/engineering": "/portfolio",
            "/engineering-portfolio": "/portfolio",
            "/projects": "/portfolio",
            "/design-teams": "/portfolio",
            "/experience": "/portfolio",
            "/artwork": "/photography",
            "/about": "/",
            "/contact": "/",
            "/about-me": "/"
        };

        // 1. Get the current path (e.g., "/site/engineering")
        let path = window.location.pathname;

        // 2. Remove the "/site" prefix so we can check our map
        // This turns "/site/engineering" into "/engineering"
        let cleanPath = path.startsWith(repoPrefix)
            ? path.substring(repoPrefix.length)
            : path;

        // 3. Remove trailing slash (turns "/engineering/" into "/engineering")
        cleanPath = cleanPath.replace(/\/$/, "");

        // 4. Check if the "clean" path is in our map
        if (redirectMap[cleanPath]) {
            // Redirect back to /site + the correct page
            window.location.replace(repoPrefix + redirectMap[cleanPath]);
        } else {
            // If no match, just go back to the home page of the site
            window.location.replace(repoPrefix + "/");
        }
    </script>
</head>

<body>
    <p>Redirecting you to the right place...</p>
</body>

</html>
