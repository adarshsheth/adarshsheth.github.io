<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Image Slideshow</title>

    <!-- Link external CSS -->
    <link rel="stylesheet" href="test.css" />
    <!-- <link rel="stylesheet" href="style.css" /> -->
        <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>

    <div id="top"></div>
    <div id="header"></div>
    <link rel="stylesheet" href="test.css" />
    
    <div class="slidedeck">

        <div class="buttons">
        <button class="left slideNav" onclick="goToSlide(0)">VFD</button>
        <button class="middle slideNav" onclick="goToSlide(1)">RED</button>
        <button class="right slideNav" onclick="goToSlide(2)">LSAR</button>
        </div>
        <div class="slideshow">
            <div class="slides">
                <section class="slide">
                <h1>VERTICAL FLIGHT DESIGN</h1>
                <p>This slide has text.</p>
                <button>Click me</button>
                </section>

                <section class="slide">
                <h1>Slide Two</h1>
                <img
                    src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR0t8V0t4lh_vCLSr_l9axR_s8Iov9HJC92HA&s"
                />
                </section>

                <section class="slide">
                <h1>Slide Three</h1>
                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
                </section>
            </div>
        </div>
    </div>
    <!-- Optional JS (if your slideshow functions exist) -->
    <!-- <script src="script.js"></script> -->
     
    <div id="footer"></div>
    <script src="test.js"></script>
    <script>
        fetch('/header.html')
        .then(res => res.text())
        .then(html => {
        document.getElementById('header').innerHTML = html;
        });
    </script>
    <!-- <script src="loadHeaderFooter.js"></script> -->
   
  </body>
</html>
